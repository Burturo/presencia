# Nom de l'application
spring.application.name=presencia

# Configuration de la base de donnees PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/presenciadb
spring.datasource.username=postgres
spring.datasource.password=Nita2024
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Pool de connexions avec HikariCP
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=10000

# Optimisations Hibernate
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# Port du serveur
server.port=8080

# Compression HTTP
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/javascript,application/json
server.compression.min-response-size=1024

# Gestion des telechargements de fichiers
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Limite du nombre de parties multipart (Tomcat)
server.tomcat.max-part-count=50

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html
spring.thymeleaf.enabled=true

# Configuration des sessions
server.servlet.session.timeout=60m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# Configuration Tomcat
server.tomcat.threads.max=200
server.tomcat.accept-count=100
server.tomcat.connection-timeout=5000
server.tomcat.max-connections=10000
server.max-http-request-header-size=8KB

# Encodage UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# Tracabilite
server.error.include-message=always

# Thread virtuels
spring.threads.virtual.enabled=true

# Enable PUT/DELETE from HTML forms
spring.mvc.hiddenmethod.filter.enabled=true

# JWT
app.jwt.secret=presencia-secret-key-change-in-production-must-be-at-least-256-bits-long
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# Attendance
app.attendance.start-hour=08:00
